[book]
title = "汽车电子七部曲"
description = "从计算的本质到汽车电子工程实践的开源技术书系列——技术总纲 + PTP + HSM + 存储 + UDS"
authors = ["Lularible"]
language = "zh"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
mathjax-support = false
no-section-label = true
additional-css = ["custom.css"]
additional-js = ["custom.js"]

[output.html.print]
enable = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.fold]
enable = true
level = 1
